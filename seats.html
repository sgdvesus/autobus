<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Acosta | Selección de Asientos</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Metropolis:wght@600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#031632",
                        "secondary": "#775a19",
                        "secondary-fixed": "#ffdea5",
                        "on-secondary-fixed-variant": "#5d4201",
                        "background": "#f9f9ff",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#44474d",
                        "outline-variant": "#c5c6ce",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        headline: ['Metropolis', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-background text-[#121c2c] font-sans antialiased; }
            h1, h2 { @apply font-headline; }
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            width: 1em;
            height: 1em;
            overflow: hidden;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            font-feature-settings: 'liga';
        }

        .bus-aisle { 
            background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px); 
            background-size: 10px 10px; 
        }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full z-50 bg-primary shadow-lg">
        <div class="max-w-[1200px] mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-white font-headline tracking-tighter italic">Acosta</div>
            <button class="bg-secondary-fixed text-on-secondary-fixed-variant px-5 py-2 rounded-lg font-bold text-sm hover:brightness-110 active:scale-95 transition-all">
                Iniciar Sesión
            </button>
        </div>
    </header>

    <main class="pt-32 pb-16 max-w-[1200px] mx-auto px-4 md:px-8">
        
        <div class="mb-10">
            <h1 class="text-3xl font-black text-primary mb-2 italic">Selección de Asientos</h1>
            <p class="text-on-surface-variant font-medium">Autobús Clase Ejecutiva - Destino: Mérida</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 items-start">
            
            <!-- CONTENEDOR DEL AUTOBÚS -->
            <section class="lg:col-span-8 bg-surface-container-lowest p-6 md:p-10 rounded-3xl border border-outline-variant shadow-sm">
                
                <div class="flex flex-wrap gap-6 mb-12 pb-6 border-b border-outline-variant justify-center">
                    <div class="flex items-center gap-2">
                        <div class="w-5 h-5 rounded border-2 border-[#10B981] bg-white"></div>
                        <span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Libre</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-5 h-5 rounded bg-slate-200"></div>
                        <span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Ocupado</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-5 h-5 rounded bg-secondary"></div>
                        <span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Selección</span>
                    </div>
                </div>

                <!-- Chasis del Bus -->
                <div class="relative max-w-[300px] mx-auto bg-white p-6 pt-10 pb-10 rounded-[3rem] border-x-[4px] border-b-[8px] border-t-[16px] border-slate-200 shadow-xl">
                    
                    <!-- Frente / Cabina -->
                    <div class="flex justify-between items-center mb-10 px-2">
                        <div class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full text-slate-400">
                            <span class="material-symbols-outlined notranslate">steering_wheel</span>
                        </div>
                        <div class="opacity-20">
                            <span class="material-symbols-outlined notranslate text-2xl">sensor_door</span>
                        </div>
                    </div>

                    <!-- Grid de Asientos (5 Columnas para permitir el pasillo central) -->
                    <div id="bus-grid" class="grid grid-cols-5 gap-3 relative min-h-[500px]">
                        <!-- Se inyectan 4 botones y 1 espacio central vía JS -->
                    </div>

                    <div class="mt-10 pt-6 border-t border-slate-100 flex justify-around opacity-10">
                        <span class="material-symbols-outlined text-xl">wc</span>
                        <span class="material-symbols-outlined text-xl">coffee</span>
                    </div>
                </div>
            </section>

            <!-- PANEL DE RESUMEN -->
            <aside class="lg:col-span-4 sticky top-32">
                <div class="bg-white rounded-3xl border-t-8 border-secondary p-8 shadow-xl border border-outline-variant">
                    <h2 class="text-[10px] font-black text-on-surface-variant mb-6 tracking-widest uppercase flex items-center gap-2">
                        <span class="material-symbols-outlined text-lg text-secondary">confirmation_number</span>
                        Resumen de Viaje
                    </h2>

                    <div class="space-y-6">
                        <div>
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Asientos elegidos</span>
                            <span id="selected-seats-display" class="text-xl font-black text-primary italic">--</span>
                        </div>

                        <div class="pt-6 border-t border-slate-100 flex justify-between items-end">
                            <div>
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Precio Total</span>
                                <p class="text-3xl font-black text-primary font-headline tracking-tighter" id="total-price-display">$0.00</p>
                            </div>
                            <p class="text-[10px] text-slate-400 font-bold uppercase">MXN</p>
                        </div>

                        <button class="w-full bg-primary text-secondary-fixed py-5 rounded-2xl font-black shadow-lg hover:bg-slate-800 active:scale-95 transition-all flex items-center justify-center gap-3 uppercase tracking-widest text-xs">
                            Continuar al Pago
                            <span class="material-symbols-outlined text-sm">arrow_forward</span>
                        </button>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <footer class="bg-primary text-white/40 py-10 mt-10 text-center">
        <p class="text-[10px] font-bold uppercase tracking-[0.3em]">Acosta Ejecutivo del Sureste</p>
    </footer>

    <script src="seats.js"></script>
</body>
</html>
